[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

[program:postgres]
command=/usr/local/bin/postgres -D /var/lib/thaum/postgresql/data
user=postgres
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=10

[program:thaum]
command=/app/docker/run_thaum.sh
user=thaum
; Ensure credentials env from entrypoint (CREDENTIALS_DIRECTORY after /run/secrets staging) reaches gunicorn.
environment=HOME="/home/thaum",CREDENTIALS_DIRECTORY="%(ENV_CREDENTIALS_DIRECTORY)s",THAUM_CREDS_DIR="%(ENV_THAUM_CREDS_DIR)s"
directory=/app
autostart=true
; Restart on any exit (including 0). ``unexpected`` treats 0 as success and will not restart thaum.
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=20
startretries=15
startsecs=1

[eventlistener:shutdown_on_thaum_fatal]
command=/venv/bin/python /app/docker/supervisor_shutdown_on_thaum_fatal.py
events=PROCESS_STATE_FATAL
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
